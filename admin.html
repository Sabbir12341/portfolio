<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Personal Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold mb-2">Admin Panel</h1>
            <p class="text-gray-400">Manage your personal website</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg">
                <div class="flex items-center">
                    <i class="fas fa-users text-blue-400 text-2xl mr-3"></i>
                    <div>
                        <p class="text-gray-400">Total Visitors</p>
                        <p class="text-2xl font-bold" id="visitorCount">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg">
                <div class="flex items-center">
                    <i class="fas fa-envelope text-green-400 text-2xl mr-3"></i>
                    <div>
                        <p class="text-gray-400">Messages</p>
                        <p class="text-2xl font-bold" id="messageCount">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg">
                <div class="flex items-center">
                    <i class="fas fa-clock text-yellow-400 text-2xl mr-3"></i>
                    <div>
                        <p class="text-gray-400">Server Status</p>
                        <p class="text-lg font-bold text-green-400">Online</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg p-6">
            <h2 class="text-xl font-bold mb-4">Recent Messages</h2>
            <div id="messagesList" class="space-y-4">
                <!-- Messages will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Load admin stats
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats');
                const data = await response.json();

                document.getElementById('visitorCount').textContent = data.visitors;
                document.getElementById('messageCount').textContent = data.messages;

                displayMessages(data.recentMessages);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Display messages
        function displayMessages(messages) {
            const messagesList = document.getElementById('messagesList');

            if (messages.length === 0) {
                messagesList.innerHTML = '<p class="text-gray-400">No messages yet.</p>';
                return;
            }

            messagesList.innerHTML = messages.map(msg => `
                <div class="bg-gray-700 p-4 rounded border-l-4 border-blue-400">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-semibold">${msg.name}</h3>
                            <p class="text-gray-400 text-sm">${msg.email}</p>
                            <p class="mt-2">${msg.message}</p>
                            <p class="text-gray-500 text-xs mt-2">${new Date(msg.timestamp).toLocaleString()}</p>
                        </div>
                        <button onclick="deleteMessage(${msg.id})" class="text-red-400 hover:text-red-300 ml-4">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Delete message
        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;

            try {
                const response = await fetch(`/api/admin/messages/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadStats(); // Reload stats and messages
                }
            } catch (error) {
                console.error('Error deleting message:', error);
            }
        }

        // Load stats on page load
        loadStats();

        // Refresh stats every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
